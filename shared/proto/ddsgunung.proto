syntax = "proto3";

package disaster.v1;

option java_package = "id.disaster.v1";

message EmptyRequest {}

message DisasterReport {
  string id = 1;
  string origin_id = 2;
  string source_name = 3;
  string latitude = 4;
  string longitude = 5;
  string bencana_type = 6;
  int32 status_level = 7;
  int32 status_penanganan = 8;
  string observation_detail = 9;
  string timestamp = 10;
}

message UpdatePenangananRequest {
  string report_id = 1;
  int32 status_penanganan = 2;
}

message PublishResponse {
  bool success = 1;
  string message = 2;
  string receipt_id = 3;
}

service DisasterCommandService {
  rpc SubscribeGlobalStream(EmptyRequest) returns (stream DisasterReport);
  rpc PublishManualReport(DisasterReport) returns (PublishResponse);
  rpc UpdateStatusPenanganan(UpdatePenangananRequest) returns (PublishResponse);
}
