// в”Ӯ disaster-reports     в”Ӯ FE Posko   в”Ӯ FE Pusat, BE     в”Ӯ Laporan form manual  в”Ӯ
// в”Ӯ sensor-stream        в”Ӯ BE         в”Ӯ FE Pusat         в”Ӯ Data sensor berkala  в”Ӯ
// в”Ӯ status-updates       в”Ӯ FE Pusat   в”Ӯ FE Posko, BE     в”Ӯ Update penanganan    в”Ӯ
